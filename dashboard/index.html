<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midea Diagnostic Port Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #eeecea;
    --text: #1a1a18; --text2: #6b6b66;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.25);
    --accent: #185FA5;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #323230;
      --text: #f0ede8; --text2: #9e9e99;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --accent: #378ADD;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg3); color: var(--text);
    min-height: 100vh; padding: 2rem 1.5rem;
  }

  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
  .subtitle code { font-family: "SF Mono","Fira Code",monospace; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 1rem;
    font-size: 13px;
  }
  .controls .ctrl { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .controls input[type="number"] {
    width: 64px; padding: 4px 8px; font-size: 13px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); font-family: inherit;
  }
  .controls input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .controls .refresh {
    margin-left: auto; padding: 5px 12px; font-size: 13px; cursor: pointer;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); font-family: inherit;
  }
  .controls .refresh:hover { border-color: var(--accent); }
  .controls .refresh:disabled { opacity: 0.5; cursor: default; }
  .controls select, .controls .mini {
    padding: 4px 8px; font-size: 13px; font-family: inherit;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
  }
  .controls .mini { cursor: pointer; }
  .controls .mini:hover { border-color: var(--accent); }
  .vbyte-list { flex-basis: 100%; display: flex; flex-wrap: wrap; gap: 8px; }
  .vbyte-list:empty { display: none; }
  .vbyte-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 4px 3px 10px; font-size: 12px;
    font-family: "SF Mono","Fira Code",monospace;
    border: 0.5px dashed var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
  }
  .vbyte-chip button {
    border: none; background: none; color: var(--text2);
    cursor: pointer; font-size: 15px; line-height: 1; padding: 0 3px;
  }
  .vbyte-chip button:hover { color: var(--text); }

  .type-card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem;
  }

  .type-header {
    display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px;
  }
  .type-title {
    font-size: 15px; font-weight: 600;
    font-family: "SF Mono","Fira Code",monospace;
  }
  .type-meta { font-size: 12px; color: var(--text2); }

  .chart-grid {
    display: grid;
    /* at most 4 columns; drop to fewer when the row can't fit 4 at 300px each */
    grid-template-columns: repeat(auto-fill, minmax(max(300px, calc((100% - 3 * 12px) / 4)), 1fr));
    gap: 12px;
  }

  .chart-panel {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
  }
  .chart-panel-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .chart-panel-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .chart-panel-title {
    font-size: 12px; font-weight: 500;
    font-family: "SF Mono","Fira Code",monospace;
  }
  .chart-panel-stats {
    display: flex; gap: 12px; margin-left: auto;
    font-size: 11px; color: var(--text2);
  }
  .chart-panel-stats span {
    font-family: "SF Mono","Fira Code",monospace; color: var(--text);
  }
  .chart-wrap { position: relative; width: 100%; height: 130px; }

  .status {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 3rem 1rem; text-align: center;
    color: var(--text2); font-size: 14px;
    border: 0.5px dashed var(--border2); border-radius: var(--radius-lg);
    background: var(--bg);
  }
  .status code {
    font-family: "SF Mono","Fira Code",monospace; font-size: 13px;
    background: var(--bg2); padding: 2px 6px; border-radius: 4px;
  }
  .status .browse {
    padding: 6px 14px; font-size: 13px; cursor: pointer;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text);
  }
  .status .browse:hover { border-color: var(--accent); }
  .status input[type="file"] { display: none; }
</style>
</head>
<body>

<h1>Midea diagnostic port visualizer</h1>
<div class="subtitle">
  Every response byte from <code>data/capture.txt</code>, grouped by response type
  (byte&nbsp;1) and plotted per byte index (bytes&nbsp;2–9) over the full capture.
</div>

<div class="controls">
  <label class="ctrl"><input type="checkbox" id="invert"> Invert bytes (0 ↔ 255)</label>
  <label class="ctrl">Show
    <select id="gran">
      <option value="byte">bytes</option>
      <option value="high">high nibble (bits 7–4)</option>
      <option value="low">low nibble (bits 3–0)</option>
    </select>
  </label>
  <label class="ctrl"><input type="checkbox" id="swapNib" checked> Swap nibbles (0xAB → 0xBA)</label>
  <label class="ctrl"><input type="checkbox" id="revBits"> Reverse bits (MSB ↔ LSB)</label>
  <label class="ctrl">Hide response types with fewer than
    <input type="number" id="minCount" value="10" min="0" step="1"> responses</label>
  <label class="ctrl">Sum
    <select id="vtypeA"></select> byte <select id="vbyteA"></select>
    + <select id="vtypeB"></select> byte <select id="vbyteB"></select>
    <button id="addVbyte" type="button" class="mini">Add</button>
  </label>
  <div id="vbyteList" class="vbyte-list"></div>
  <button id="resetZoom" class="refresh" title="Reset zoom on all charts" style="margin-left:auto">⤢ Reset zoom</button>
  <button id="refresh" class="refresh" title="Reload capture.txt" style="margin-left:0">↺ Refresh</button>
</div>

<div id="status" class="status">
  <div>Loading <code>../data/capture.txt</code>…</div>
</div>

<div id="dashboard"></div>

<script>
// ── palette (one stable color per byte index 2–9) ─────────────────────────────
const PALETTE = [
  '#185FA5', '#0F6E56', '#993C1D', '#3B6D11',
  '#534AB7', '#993556', '#BA7517', '#A32D2D',
];
const PALETTE_DARK = [
  '#378ADD', '#1D9E75', '#D85A30', '#639922',
  '#7F77DD', '#D4537E', '#EF9F27', '#E24B4A',
];
const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
const colorForByte = i => (isDark() ? PALETTE_DARK : PALETTE)[(i - 2) % 8];
const virtualColor = (a, b) => (isDark() ? PALETTE_DARK : PALETTE)[(a + b) % 8];

const RESPONSE_BYTES = 10;   // AA(0) type(1) payload(2..8) terminator(9)
const PLOT_BYTES = [2, 3, 4, 5, 6, 7, 8, 9];
const hex2 = v => '0x' + v.toString(16).toUpperCase().padStart(2, '0');
const fmtTime = ts => {
  const d = new Date(ts * 1000), p = n => String(n).padStart(2, '0');
  return `${p(d.getHours())}:${p(d.getMinutes())}`;
};

// ── parse the capture log ─────────────────────────────────────────────────────
// Each line looks like:
//   1784075061 req=0x558000000000000000AA, res=0xAA40000000000000C065
// We keep the response, split it into bytes, and group by the type byte (idx 1).
function parse(text) {
  const byType = new Map();   // typeByte -> [{bytes:[...]}, ...]
  for (const line of text.split('\n')) {
    const m = line.match(/res=0x([0-9A-Fa-f]{20})\b/);
    if (!m) continue;
    const hex = m[1];
    const bytes = [];
    for (let i = 0; i < RESPONSE_BYTES; i++) bytes.push(parseInt(hex.substr(i * 2, 2), 16));
    const tsMatch = line.match(/^\s*(\d+)/);   // unix seconds at the start of the line
    const ts = tsMatch ? Number(tsMatch[1]) : null;
    const type = bytes[1];
    if (!byType.has(type)) byType.set(type, []);
    byType.get(type).push({ ts, bytes });
  }
  return byType;
}

// ── render ────────────────────────────────────────────────────────────────────
let PARSED = new Map();    // typeByte -> rows; set once the file is loaded
let activeCharts = [];     // Chart instances, torn down on each re-render
let virtualBytes = [];     // [{ta, a, tb, b}] — charts of type-ta byte[a] + type-tb byte[b]

// When one chart is zoomed, apply the same time window to every other chart so
// all bytes/types stay aligned (like a Grafana dashboard time range).
let syncing = false;
function syncZoom({ chart }) {
  if (syncing) return;
  syncing = true;
  const { min, max } = chart.scales.x;
  for (const c of activeCharts) {
    if (c !== chart) c.zoomScale('x', { min, max }, 'none');
  }
  syncing = false;
}

function render() {
  const dashboard = document.getElementById('dashboard');
  const status = document.getElementById('status');

  // tear down the previous render
  activeCharts.forEach(c => c.destroy());
  activeCharts = [];
  dashboard.innerHTML = '';

  const invert = document.getElementById('invert').checked;
  const minCount = Math.max(0, parseInt(document.getElementById('minCount').value, 10) || 0);
  const gran = document.getElementById('gran').value;   // 'byte' | 'high' | 'low'
  const swapNib = document.getElementById('swapNib').checked;
  const revBits = document.getElementById('revBits').checked;
  const nibbleFn = gran === 'high' ? v => (v >> 4) & 0xF
                 : gran === 'low'  ? v => v & 0xF
                 : v => v;
  const swapFn = swapNib ? v => ((v & 0xF) << 4) | ((v >> 4) & 0xF) : v => v;
  const revFn = revBits ? v => { let r = 0; for (let i = 0; i < 8; i++) r = (r << 1) | ((v >> i) & 1); return r; } : v => v;
  // apply in byte space (invert, reverse bits, swap nibbles) then pick the nibble
  const val = raw => nibbleFn(swapFn(revFn(invert ? 255 - raw : raw)));
  const isNibble = gran !== 'byte';
  const granSuffix = gran === 'high' ? ' (hi)' : gran === 'low' ? ' (lo)' : '';
  const byteYMax = isNibble ? 15 : 255;
  const byteYTicks = isNibble ? [0, 4, 8, 12, 15] : [0, 64, 128, 192, 255];

  const total = [...PARSED.values()].reduce((n, r) => n + r.length, 0);
  const types = [...PARSED.keys()]
    .filter(t => PARSED.get(t).length >= minCount)
    .sort((a, b) => a - b);

  if (!total) {
    status.style.display = 'flex';
    status.innerHTML = '<div>No responses found in the capture file.</div>';
    return;
  }
  if (!types.length) {
    status.style.display = 'flex';
    status.innerHTML = `<div>No response types with at least ${minCount} responses.</div>`;
    return;
  }
  status.style.display = 'none';

  renderVirtualSection(val, isNibble, granSuffix);

  for (const type of types) {
    const rows = PARSED.get(type);

    const card = document.createElement('div');
    card.className = 'type-card';

    const header = document.createElement('div');
    header.className = 'type-header';
    header.innerHTML =
      `<div class="type-title">Response ${hex2(type)}</div>` +
      `<div class="type-meta">${rows.length.toLocaleString()} responses</div>`;
    card.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'chart-grid';
    card.appendChild(grid);
    dashboard.appendChild(card);

    for (const byteIdx of PLOT_BYTES) {
      const points = rows.map(r => ({ x: r.ts, y: val(r.bytes[byteIdx]) }));
      const label = (byteIdx === 9 ? `byte ${byteIdx} (term)` : `byte ${byteIdx}`) + granSuffix;
      addChart(grid, { label, color: colorForByte(byteIdx), points,
                       yMax: byteYMax, yTicks: byteYTicks });
    }
  }
}

// Standalone card of virtual bytes: sum of one byte from response type A and one
// from type B. Operands are paired by occurrence index (the Nth response of each
// type) — responses are captured round-robin, so same-index samples line up in
// time. The A operand supplies the x (timestamp).
function renderVirtualSection(val, isNibble, granSuffix) {
  if (!virtualBytes.length) return;

  const card = document.createElement('div');
  card.className = 'type-card';
  card.innerHTML = `<div class="type-header"><div class="type-title">Virtual bytes</div>` +
    `<div class="type-meta">sum of two bytes, across response types</div></div>`;
  const grid = document.createElement('div');
  grid.className = 'chart-grid';
  card.appendChild(grid);
  document.getElementById('dashboard').appendChild(card);

  const yMax = isNibble ? 30 : 510;
  const yTicks = isNibble ? [0, 8, 15, 23, 30] : [0, 128, 255, 383, 510];

  for (const { ta, a, tb, b } of virtualBytes) {
    const rowsA = PARSED.get(ta), rowsB = PARSED.get(tb);
    if (!rowsA || !rowsB) continue;
    const n = Math.min(rowsA.length, rowsB.length);
    const points = [];
    for (let i = 0; i < n; i++) {
      points.push({ x: rowsA[i].ts, y: val(rowsA[i].bytes[a]) + val(rowsB[i].bytes[b]) });
    }
    addChart(grid, {
      label: `${hex2(ta)}[${a}] + ${hex2(tb)}[${b}]${granSuffix}`,
      color: virtualColor(a, b), points,
      yMax, yTicks, dash: true,
    });
  }
}

// Build one chart panel from an array of {x: unix seconds, y: value} points and
// track it. Real byte and virtual-sum charts both go through here.
function addChart(grid, { label, color, points, yMax, yTicks, dash }) {
  const axisColor = isDark() ? '#9e9e99' : '#888';
  const gridColor = isDark() ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const vals = points.map(p => p.y);
  const min = Math.min(...vals), max = Math.max(...vals);
  const uniq = new Set(vals).size;

  const panel = document.createElement('div');
  panel.className = 'chart-panel';
  panel.innerHTML = `
    <div class="chart-panel-header">
      <div class="chart-panel-swatch" style="background:${color}"></div>
      <div class="chart-panel-title">${label}</div>
      <div class="chart-panel-stats">
        <div>min <span>${hex2(min)}</span></div>
        <div>max <span>${hex2(max)}</span></div>
        <div>uniq <span>${uniq}</span></div>
      </div>
    </div>
    <div class="chart-wrap"><canvas></canvas></div>`;
  grid.appendChild(panel);

  activeCharts.push(new Chart(panel.querySelector('canvas'), {
    type: 'line',
    data: {
      datasets: [{
        data: points,
        borderColor: color,
        backgroundColor: color,
        borderWidth: 1.25,
        borderDash: dash ? [4, 3] : [],
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      parsing: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => fmtTime(ctx[0].parsed.x),
            label: ctx => ` ${hex2(ctx.parsed.y)}  (${ctx.parsed.y})`,
          },
        },
        zoom: {
          // drag a horizontal box to zoom the time range (Grafana-style)
          zoom: { drag: { enabled: true }, mode: 'x', onZoomComplete: syncZoom },
        },
      },
      scales: {
        x: {
          type: 'linear',
          bounds: 'data',   // axis spans exactly the data range — no end padding
          ticks: {
            maxTicksLimit: 6, color: axisColor, font: { size: 10 },
            callback: v => fmtTime(v),
          },
          grid: { color: gridColor },
        },
        y: {
          min: 0, max: yMax,
          afterBuildTicks: axis => { axis.ticks = yTicks.map(value => ({ value })); },
          ticks: { color: axisColor, font: { size: 10 } },
          grid: { color: gridColor },
        },
      },
    },
  }));
}

// ── load ──────────────────────────────────────────────────────────────────────
document.getElementById('invert').addEventListener('change', render);
document.getElementById('gran').addEventListener('change', render);
document.getElementById('swapNib').addEventListener('change', render);
document.getElementById('revBits').addEventListener('change', render);
document.getElementById('minCount').addEventListener('input', render);
document.getElementById('refresh').addEventListener('click', loadFile);
document.getElementById('resetZoom').addEventListener('click', () => {
  syncing = true;   // avoid re-sync churn while resetting each chart
  activeCharts.forEach(c => c.resetZoom());
  syncing = false;
});

// ── virtual bytes (sum of two bytes, possibly across response types) ───────────
function initVbyteControls() {
  const byteOpts = PLOT_BYTES.map(i => `<option value="${i}">byte ${i}</option>`).join('');
  const a = document.getElementById('vbyteA'), b = document.getElementById('vbyteB');
  a.innerHTML = byteOpts; b.innerHTML = byteOpts;
  a.value = '4'; b.value = '5';
  document.getElementById('addVbyte').addEventListener('click', () => {
    const v = {
      ta: Number(document.getElementById('vtypeA').value), a: Number(a.value),
      tb: Number(document.getElementById('vtypeB').value), b: Number(b.value),
    };
    if (Number.isNaN(v.ta) || Number.isNaN(v.tb)) return;   // no data loaded yet
    if (!virtualBytes.some(x => x.ta === v.ta && x.a === v.a && x.tb === v.tb && x.b === v.b)) {
      virtualBytes.push(v);
      renderVbyteList();
      render();
    }
  });
}

// Fill the response-type dropdowns from the loaded data, preserving any selection.
function populateVbyteTypes() {
  // drop one-off noise types (a corrupt read shows up as a type with 1 response)
  const types = [...PARSED.keys()].filter(t => PARSED.get(t).length > 1).sort((x, y) => x - y);
  const opts = types.map(t => `<option value="${t}">${hex2(t)}</option>`).join('');
  for (const id of ['vtypeA', 'vtypeB']) {
    const sel = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = opts;
    if (types.some(t => String(t) === prev)) sel.value = prev;
  }
}

function renderVbyteList() {
  const list = document.getElementById('vbyteList');
  list.innerHTML = virtualBytes.map((v, i) =>
    `<span class="vbyte-chip">${hex2(v.ta)}[${v.a}] + ${hex2(v.tb)}[${v.b}]` +
    `<button data-i="${i}" title="remove">×</button></span>`
  ).join('');
  list.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    virtualBytes.splice(Number(btn.dataset.i), 1);
    renderVbyteList();
    render();
  }));
}

initVbyteControls();

function loadFile() {
  const btn = document.getElementById('refresh');
  btn.disabled = true;
  // cache-bust so a freshly captured file isn't served from the browser cache
  fetch('../data/capture.txt?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => { PARSED = parse(text); populateVbyteTypes(); render(); })
    .catch(() => {
      // file:// or missing file — offer a manual picker as a fallback
      const status = document.getElementById('status');
      status.style.display = 'flex';
      status.innerHTML = `
        <div>Couldn't load <code>../data/capture.txt</code> automatically.</div>
        <div>Serve the repo over HTTP (e.g. <code>python3 -m http.server</code>) and open
          <code>/dashboard/</code>, or pick the file manually:</div>
        <label class="browse">Choose capture.txt<input type="file" accept=".txt,.log"></label>`;
      status.querySelector('input').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        file.text().then(text => { PARSED = parse(text); populateVbyteTypes(); render(); });
      });
    })
    .finally(() => { btn.disabled = false; });
}

loadFile();
</script>
</body>
</html>
